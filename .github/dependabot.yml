version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]

  - package-ecosystem: "npm"
    directory: "/sdk"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]

  - package-ecosystem: "npm"
    directory: "/poster"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]

  - package-ecosystem: "gomod"
    directory: "/cli"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "go"]

  - package-ecosystem: "cargo"
    directory: "/core"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "rust"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
