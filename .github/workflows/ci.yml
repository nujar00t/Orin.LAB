name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile orin.py
          python -m py_compile bot/telegram_bot.py
          python -m py_compile agents/signal_engine.py
          python -m py_compile agents/market_analyst.py
          python -m py_compile agents/onchain_agent.py
          echo "Syntax OK"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  typescript-check:
    name: TypeScript Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
      - name: Install and build SDK
        run: cd sdk && npm install && npx tsc --noEmit
      - name: Install and build Poster
        run: cd poster && npm install && npx tsc --noEmit

  go-check:
    name: Go Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.22"
      - name: Build CLI
        run: cd cli && go build ./...
      - name: Test CLI
        run: cd cli && go test ./...
      - name: Vet
        run: cd cli && go vet ./...

  rust-check:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build core
        run: cd core && cargo build
      - name: Test core
        run: cd core && cargo test
      - name: Clippy
        run: cd core && cargo clippy -- -D warnings

  verify-files:
    name: Verify Required Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check required files
        run: |
          test -f README.md          && echo "README.md OK"
          test -f LICENSE            && echo "LICENSE OK"
          test -f CONTRIBUTING.md    && echo "CONTRIBUTING.md OK"
          test -f SECURITY.md        && echo "SECURITY.md OK"
          test -f CODE_OF_CONDUCT.md && echo "CODE_OF_CONDUCT.md OK"
          test -f .env.example       && echo ".env.example OK"
          test -f requirements.txt   && echo "requirements.txt OK"
          test -f pyproject.toml     && echo "pyproject.toml OK"
